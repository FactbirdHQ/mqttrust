[package]
name = "embedded-mqtt"
version = "0.1.0"
edition = "2021"

[workspace]
members = []
default-members = ["."]
exclude = ["examples"]

[[bench]]
name = "benches"
harness = false
path = "tests/benches/pubsub.rs"

[dependencies]
embedded-io-async = { version = "0.6" }
embedded-nal-async = { version = "0.7" }
serde = { version = "1", features = ["derive"], default-features = false }
heapless = { version = "0.8", features = ["serde"] }
num_enum = { version = "0.7", default-features = false }
futures = { version = "0.3.28", default-features = false }
itertools = { version = "0.12", default-features = false }
hash32 = "0.3.1"
hash32-derive = "0.1.1"

defmt = { version = "0.3.5", optional = true }
log = { version = "0.4", optional = true }

embassy-sync = { version = "0.4", features = ["nightly"] }
embassy-futures = "0.1"
embassy-time = { version = "0.1" }

[dev-dependencies]
tokio = { version = "1.32", features = ["rt", "macros"] }
static_cell = { version = "2", features = ["nightly"] }
critical-section = { version = "1.1", features = ["std"] }
rand = "0.8.5"
criterion = "0.5.1"
crossbeam-utils = "0.8.16"
crossbeam = "0.8.2"
env_logger = "0.10"
embassy-time = { version = "0.1", features = ["std", "nightly"] }
native-tls = { version = "^0.2" }
dns-lookup = "2"
async-io = { version = "2", default-features = false }
embedded-io-async = { version = "0.6", features = ["std"] }
futures-lite = { version = "1", default-features = false, features = ["std"] }

[features]
default = ["mqttv3", "qos2"]

mqttv3 = []
mqttv5 = []

qos2 = []

