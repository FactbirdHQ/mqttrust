[package]
name = "embedded-mqtt"
version = "0.1.0"
edition = "2021"

[workspace]
members = []
default-members = ["."]
exclude = ["examples"]

[[bench]]
name = "benches"
harness = false
path = "tests/benches/pubsub.rs"

[dependencies]
embedded-io-async = { version = "0.6" }
embedded-nal-async = { version = "0.6" }
serde = { version = "1", features = ["derive"], default-features = false }
heapless = { version = "0.7", features = ["serde"] }
varint-rs = {version = "2.2", default-features = false }
num_enum = { version = "0.7", default-features = false }
bit_field = { version = "0.10" }
futures = { version = "0.3.28", default-features = false }

embassy-sync = { version = "0.3", features = ["nightly"] }
embassy-futures = "0.1"
embassy-time = { version = "0.1" }

[dev-dependencies]
tokio = { version = "1.32", features = ["rt", "macros"] }
static_cell = { version = "1.1", features = ["nightly"] }
critical-section = { version = "1.1", features = ["std"] }
rand = "0.8.5"
criterion = "0.5.1"
crossbeam-utils = "0.8.16"
crossbeam = "0.8.2"
log = "0.4"
env_logger = "0.10"
embassy-time = { version = "0.1", features = ["std"] }
native-tls = { version = "^0.2" }
dns-lookup = "2"

[features]
default = ["mqttv3"]

mqttv3 = []
mqttv5 = []

qos2 = []

