[package]
name = "embedded-mqtt-examples-rp2040"
version = "0.1.0"
edition = "2021"

[dependencies]
embedded-mqtt = { path = "../../" }
embassy-executor = { version = "0.5.0", features = [
    "defmt",
    "integrated-timers",
] }
embassy-time = { version = "0.3", features = [
    "defmt",
    "defmt-timestamp-uptime",
] }
embassy-rp = { version = "0.1.0", features = [
    "defmt",
    "unstable-traits",
    "nightly",
    "unstable-pac",
    "time-driver",
] }
embassy-sync = { version = "0.5.0" }
portable-atomic = { version = "1.0.2", features = [
    "unsafe-assume-single-core",
] }

static_cell = { version = "2", features = ["nightly"] }
defmt = "0.3.4"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }

cortex-m = { version = "0.7.6", features = ["critical-section-single-core"] }
futures = { version = "0.3.17", default-features = false, features = [
    "async-await",
    "cfg-target-has-atomic",
    "unstable",
] }


[patch.crates-io]
# embassy-executor = { git = "https://github.com/embassy-rs/embassy", rev = "03d6363d5af5dcaf21b52734994a466ca593d2b6" }
# embassy-time = { git = "https://github.com/embassy-rs/embassy", rev = "03d6363d5af5dcaf21b52734994a466ca593d2b6" }
# embassy-sync = { git = "https://github.com/embassy-rs/embassy", rev = "03d6363d5af5dcaf21b52734994a466ca593d2b6" }
# embassy-rp = { git = "https://github.com/embassy-rs/embassy", rev = "03d6363d5af5dcaf21b52734994a466ca593d2b6" }


embassy-executor = { path = "../../../embassy/embassy-executor" }
embassy-hal-internal = { path = "../../../embassy/embassy-hal-internal" }
embassy-time = { path = "../../../embassy/embassy-time" }
# embassy-sync = { path = "../../../embassy/embassy-sync" }
embassy-rp = { path = "../../../embassy/embassy-rp" }

[profile.dev]
debug = 2
debug-assertions = true
opt-level = 1
overflow-checks = true

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = 'fat'
opt-level = 'z'
overflow-checks = false

# do not optimize proc-macro crates = faster builds from scratch
[profile.dev.build-override]
codegen-units = 8
debug = false
debug-assertions = false
opt-level = 0
overflow-checks = false

[profile.release.build-override]
codegen-units = 8
debug = false
debug-assertions = false
opt-level = 0
overflow-checks = false

[package.metadata.cargo-machete]
ignored = ["cortex-m", "defmt-rtt", "panic-probe", "portable-atomic"]
